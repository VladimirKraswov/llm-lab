services:
  itk-ai-trainer-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: itk-ai-trainer-service:qwen-7b
    env_file:
      - .env.remote.example
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - ./output:/output
    gpus: all
    shm_size: "16gb"
    restart: "no"