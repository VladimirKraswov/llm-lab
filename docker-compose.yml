services:
  llm-lab:
    build: .
    image: llm-lab:latest
    container_name: llm-lab
    ports:
      - "8787:8787"
    volumes:
      - ./workspace:/workspace
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - WORKSPACE=/workspace
      - ML_ENV=/opt/venv
      - QUANTIZE_ENV=/opt/venv
      - TRANSFORMERS_ENV=/opt/venv
      - SVC_PORT=8787
      - SVC_HOST=0.0.0.0
    restart: unless-stopped
