services:
  orchestrator:
    image: ${DOCKER_USER:-llmlab}/orchestrator:latest
    container_name: llm-lab-orchestrator
    ports:
      - "8787:8787"
    volumes:
      - ./workspace:/workspace
    environment:
      - WORKSPACE=/workspace
      - SVC_PORT=8787
      - SVC_HOST=0.0.0.0
      - CALLBACK_BASE_URL=http://orchestrator:8787
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-restart987}
      - JWT_SECRET=${JWT_SECRET:-llm-lab-super-secret-key}
      - REQUIRE_JWT_SECRET=true
    restart: unless-stopped

  # Optional: PostgreSQL if not using SQLite
